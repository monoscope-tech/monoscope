name: fourmolu
on: push

# Serialise per-branch so two pushes can't race for the same fast-forward.
concurrency:
  group: fourmolu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    # Dependabot pushes use a read-only GITHUB_TOKEN; skip rather than 403.
    if: github.actor != 'dependabot[bot]'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache fourmolu
        id: cache-fourmolu
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/fourmolu
          key: fourmolu-0.19.0.0

      - name: Install fourmolu
        if: steps.cache-fourmolu.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://github.com/fourmolu/fourmolu/releases/download/v0.19.0.0/fourmolu-0.19.0.0-linux-x86_64 -o ~/.local/bin/fourmolu
          chmod +x ~/.local/bin/fourmolu

      - name: Add fourmolu to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Format code
        run: make fmt

      - name: Commit & push formatted code
        run: |
          if git diff --quiet; then
            echo "no formatting changes"
            exit 0
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Auto-format code with fourmolu"
          # Race-safe push: if upstream moved while we were formatting, rebase and retry once.
          for i in 1 2 3; do
            if git push origin HEAD:${GITHUB_REF#refs/heads/}; then exit 0; fi
            git pull --rebase origin ${GITHUB_REF#refs/heads/}
          done
          exit 1
