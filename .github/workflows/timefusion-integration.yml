# Runs the integration suite with the dual-write TimeFusion leg pointed at a
# REAL TimeFusion container (not Postgres-as-TF). The normal PR/deploy jobs
# leave TIMEFUSION_PG_TEST_URL unset, which makes the "timefusion" hasql pool
# fall back to the test Postgres with tfPgTypes=True — so TF-specific pgwire
# behaviour (untyped placeholders, unnest casts, Variant coercion) is never
# exercised. The 2026-07-06 silent-loss incident began with uncast unnest
# params that pass on Postgres and fail Parse on real TF; this job would have
# caught it. Nightly + on-demand so a heavy TF container doesn't gate every PR.
name: TimeFusion Integration (nightly)

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      tf_image_tag:
        description: 'TimeFusion image tag (git short-SHA or "latest")'
        default: 'latest'

env:
  LANG: C.UTF-8

jobs:
  timefusion-integration:
    name: Integration vs real TimeFusion
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 40
    container:
      image: ghcr.io/monoscope-tech/monoscope-deps:latest
      env:
        CABAL_DIR: /root/.cabal
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-all
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monoscope
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          # TF needs its bucket to exist before it opens the Delta table.
          MINIO_DEFAULT_BUCKETS: monoscope-test,timefusion
        options: >-
          --health-cmd="curl -fsS http://localhost:9000/minio/health/live"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
      timefusion:
        image: ghcr.io/monoscope-tech/timefusion:${{ github.event.inputs.tf_image_tag || 'latest' }}
        env:
          PGWIRE_PORT: '5432'
          AWS_S3_BUCKET: timefusion
          AWS_S3_ENDPOINT: http://minio:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
          AWS_ALLOW_HTTP: 'true'
          TIMEFUSION_DATA_DIR: /tmp/tf-data
          # Flush every bucket immediately so a test's writes are queryable
          # from Delta within the test's lifetime (no 10-min wait).
          TIMEFUSION_BUFFER_FLUSH_IMMEDIATELY: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Cache dist-newstyle
        uses: actions/cache@v5
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-container-cabal-${{ hashFiles('**/*.cabal', '**/cabal.project*') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-container-cabal-${{ hashFiles('**/*.cabal', '**/cabal.project*') }}-
            ${{ runner.os }}-container-cabal-

      # Integration write-path specs don't serve the UI; empty dirs satisfy the
      # asset-path lookups without building the frontend.
      - name: Setup static directories
        run: |
          mkdir -p static/public/assets/css
          mkdir -p static/public/assets/web-components/dist/js
          mkdir -p static/public/assets/web-components/dist/css

      - name: Build
        run: cabal build all -j --ghc-options="-O0 +RTS -A64m -n2m -RTS"

      - name: Wait for TimeFusion pgwire
        run: |
          for i in $(seq 1 60); do
            if psql "postgresql://postgres:postgres@timefusion:5432/postgres" -c 'SELECT 1' >/dev/null 2>&1; then
              echo "TimeFusion is up"; exit 0
            fi
            sleep 2
          done
          echo "TimeFusion did not become ready" >&2; exit 1

      - name: Run integration-tests against real TimeFusion
        env:
          USE_EXTERNAL_DB: true
          DB_HOST: postgres
          LOG_LEVEL: warn
          MINIO_ENDPOINT: http://minio:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          # The one line that flips the TF leg from Postgres-as-TF to real TF:
          # TestUtils.withTestResources sees this and sets tfEnabled + tfPgTypes=False.
          TIMEFUSION_PG_TEST_URL: postgresql://postgres:postgres@timefusion:5432/postgres
        run: |
          bin=$(cabal list-bin integration-tests)
          rm -f build-shard-*.log
          for i in 0 1 2 3; do
            ( start=$(date +%s); SHARD_INDEX=$i SHARD_TOTAL=4 "$bin" --color > build-shard-$i.log 2>&1; echo "[shard-time] $(( $(date +%s) - start ))s" >> build-shard-$i.log ) &
          done
          wait
          echo "=== per-shard (wall-clock | result) ==="
          for i in 0 1 2 3; do printf "shard %s: %-6s | %s\n" "$i" "$(sed -n 's/.*\[shard-time\] //p' build-shard-$i.log | tail -1)" "$(grep -hE 'examples?, [0-9]+ failures?' build-shard-$i.log | tail -1)"; done
          green=$(grep -lE "examples?, 0 failures" build-shard-*.log | wc -l | tr -d ' ')
          if [ "$green" -ne 4 ] || grep -qE "[1-9][0-9]* failures?|Interrupted" build-shard-*.log; then
            echo "SHARDED RUN FAILED ($green/4 green):"
            for f in build-shard-*.log; do grep -qE "examples?, 0 failures" "$f" || { echo "### $f"; tail -60 "$f"; }; done
            exit 1
          fi
          echo "ALL SHARDS GREEN vs real TimeFusion"
