name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  LANG: C.UTF-8

jobs:
  # Build frontend once and share via artifacts
  frontend:
    name: Build Frontend
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web-components/package-lock.json

      - name: Build frontend assets
        run: |
          mkdir -p static/public/assets/css
          mkdir -p static/public/assets/web-components/dist/js
          mkdir -p static/public/assets/web-components/dist/css
          npm ci
          npx tailwindcss -i ./static/public/assets/css/tailwind.css -o ./static/public/assets/css/tailwind.min.css --minify
          cd web-components
          npm ci
          NODE_ENV=production npx vite build --mode production --sourcemap false

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-assets
          path: |
            static/public/assets/css/tailwind.min.css
            static/public/assets/web-components/dist
          retention-days: 1

  build-and-test:
    name: Build and Test
    needs: frontend
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/monoscope-tech/monoscope-deps:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GH_TOKEN }}
      env:
        CABAL_DIR: /root/.cabal
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-all
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monoscope
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          # timefusion bucket must exist before TF opens its Delta table.
          MINIO_DEFAULT_BUCKETS: monoscope-test,timefusion
        options: >-
          --health-cmd="curl -fsS http://localhost:9000/minio/health/live"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
      # Real TimeFusion so the dual-write TF leg is exercised exactly like prod
      # (untyped placeholders, unnest casts, Variant coercion) instead of the
      # Postgres-as-TF fallback. TIMEFUSION_PG_TEST_URL below flips it on.
      timefusion:
        # Pinned to a deployed prod TF SHA (TF publishes only short-SHA tags,
        # no :latest). Bump when prod TF upgrades.
        image: ghcr.io/monoscope-tech/timefusion:36e550a
        credentials:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}
        env:
          PGWIRE_PORT: '5432'
          AWS_S3_BUCKET: timefusion
          AWS_S3_ENDPOINT: http://minio:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
          AWS_ALLOW_HTTP: 'true'
          TIMEFUSION_DATA_DIR: /tmp/tf-data
          # Flush each bucket immediately so a test's writes are queryable within
          # the test's lifetime (no 10-min wait).
          TIMEFUSION_BUFFER_FLUSH_IMMEDIATELY: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Cache dist-newstyle
        uses: actions/cache@v5
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-container-cabal-${{ hashFiles('**/*.cabal', '**/cabal.project*') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-container-cabal-${{ hashFiles('**/*.cabal', '**/cabal.project*') }}-
            ${{ runner.os }}-container-cabal-

      - name: Download frontend artifacts
        uses: actions/download-artifact@v8
        with:
          name: frontend-assets
          path: static/public/assets

      - name: Setup static directories
        run: |
          mkdir -p static/public/assets/css
          mkdir -p static/public/assets/web-components/dist/js
          mkdir -p static/public/assets/web-components/dist/css

      - name: Install hpack
        run: cabal install --install-method=copy --overwrite-policy=always hpack

      - name: Regenerate cabal file
        run: hpack

      - name: Build
        run: cabal build all -j --ghc-options="-O0 +RTS -A64m -n2m -RTS"

      - name: Run doctests
        run: cabal test doctests --ghc-options="-O0" --test-show-details=direct

      - name: Run unit-tests
        run: cabal test unit-tests --ghc-options="-O0" --test-show-details=direct

      - name: Wait for TimeFusion pgwire
        run: |
          for i in $(seq 1 60); do
            (echo > /dev/tcp/timefusion/5432) >/dev/null 2>&1 && { echo "TimeFusion up"; exit 0; }
            sleep 2
          done
          echo "TimeFusion did not open pgwire" >&2; exit 1

      - name: Run integration-tests
        env:
          USE_EXTERNAL_DB: true
          DB_HOST: postgres
          TWILIO_ACCOUNT_SID: ${{ vars.TWILIO_ACCOUNT_SID }}
          DISCORD_CLIENT_ID: "1328384474395967631"
          LOG_LEVEL: warn
          MINIO_ENDPOINT: http://minio:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          # Real TimeFusion leg: TestUtils sets tfEnabled + tfPgTypes=False.
          TIMEFUSION_PG_TEST_URL: postgresql://postgres:postgres@timefusion:5432/postgres
        # Process-sharded (see test/integration/Main.hs): 4 binary copies, each its own
        # RTS running a disjoint shard (SHARD_INDEX/SHARD_TOTAL) sequentially. Sidesteps
        # the in-process hspec `parallel` deadlock; 4 * ~9 conns < Postgres
        # max_connections. Inlined (no `make` in the deps image).
        run: |
          bin=$(cabal list-bin integration-tests)
          rm -f build-shard-*.log
          for i in 0 1 2 3; do
            ( start=$(date +%s); SHARD_INDEX=$i SHARD_TOTAL=4 "$bin" --color > build-shard-$i.log 2>&1; echo "[shard-time] $(( $(date +%s) - start ))s" >> build-shard-$i.log ) &
          done
          wait
          echo "=== per-shard (wall-clock | result) — wide spreads ⇒ rebalance ==="
          for i in 0 1 2 3; do printf "shard %s: %-6s | %s\n" "$i" "$(sed -n 's/.*\[shard-time\] //p' build-shard-$i.log | tail -1)" "$(grep -hE 'examples?, [0-9]+ failures?' build-shard-$i.log | tail -1)"; done
          green=$(grep -lE "examples?, 0 failures" build-shard-*.log | wc -l | tr -d ' ')
          # green==4 already means every shard printed a clean "0 failures" summary; don't grep
          # for "error:" too — the app logs error: lines at LOG_LEVEL=warn on passing runs.
          if [ "$green" -ne 4 ] || grep -qE "[1-9][0-9]* failures?|Interrupted" build-shard-*.log; then
            echo "SHARDED RUN FAILED ($green/4 green):"
            for f in build-shard-*.log; do grep -qE "examples?, 0 failures" "$f" || { echo "### $f"; tail -40 "$f"; }; done
            exit 1
          fi
          echo "ALL SHARDS GREEN"

  build-and-deploy:
    name: Build and Deploy Docker Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push Docker Image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          # cache-from/cache-to and platforms are incompatible with docker driver.
          # Caching is handled by --mount=type=cache in Dockerfile instead.
          # Re-enable these if switching back to docker-container driver (ubuntu-latest).
          # cache-from: |
          #   type=gha
          #   type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:buildcache
          # cache-to: |
          #   type=gha,mode=max
          #   type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:buildcache,mode=max
          # platforms: linux/amd64
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            GIT_HASH=${{ github.sha }}
            GIT_COMMIT_DATE=${{ github.event.head_commit.timestamp || 'unknown' }}

      - name: Deploy Image to CapRrover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: '${{ secrets.CAPTAINROVER_SERVER }}'
          app: '${{ secrets.CAPTAINROVER_APP_NAME }}'
          token: '${{ secrets.CAPTAINROVER_APP_TOKEN }}'
          image: 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}'
