# Flat-key format: dotted strings on the left, translated text on the right.
# Keys are referenced from Haskell as `t lang "auth.login.title"` etc. — keep
# them in sync with es.yaml (same key set). Missing keys fall through to the
# key itself so a typo shows up visibly in the UI.

