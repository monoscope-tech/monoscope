# Traducciones en español para la UI de Monoscope.
#
# Formato de clave plana: cadenas separadas por puntos a la izquierda, texto
# traducido a la derecha. Las claves se referencian desde Haskell como
# `t lang "auth.login.title"`. Mantén el mismo conjunto de claves que en.yaml;
# si falta una clave, la UI muestra la clave en bruto (sirve como aviso visible).

