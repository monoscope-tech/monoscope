name: monoscope
version: 0.1.0.0
github: 'monoscope-tech/monoscope'
license: AGPL-3.0-only
license-file: LICENSE
author: 'Monoscope'
maintainer: 'hello@monoscope.tech'
copyright: '2021-2026 Monoscope'
language: GHC2024
spec-version: 0.36.0

build-type: Custom
custom-setup:
  dependencies:
    - base
    - Cabal
    - proto-lens-setup

build-tools:
  - proto-lens-protoc:proto-lens-protoc

extra-source-files:
  - proto/**/*.proto
  # - README.md
  - auto-instrument-config.toml
  - static/migrations/**/*
  # - static/public/**/*.png
  # - static/public/**/*.css
  # - static/public/**/*.ttf
  # - static/public/**/*.woff
  # - static/public/**/*.woff2
  # - static/public/**/*.js
  # - static/public/**/*.json
  # - static/public/**/*.svg
  # - static/public/**/*.jpg
  # - static/public/**/*.webp
  # - static/public/**/*.html
  # - static/public/**/*.map
  # - static/public/**/*.yaml
  # - static/public/**/*.ico
  # - static/public/site.webmanifest

# generated-other-modules:
# generated-exposed-modules:

ghc-options:
  - -fwrite-ide-info
  - -threaded
  - -Weverything
  # - -fdefer-type-errors
  - -Werror # Treat warnings as errors
  - -fno-defer-typed-holes
  - -Wno-error=deprecations
  - -Wno-error=unused-packages
  - -Wno-error=implicit-lift
  - -Wno-error=missing-poly-kind-signatures
  - -Wno-missing-exported-signatures # missing-exported-signatures turns off the more strict -Wmissing-signatures. See https://ghc.haskell.org/trac/ghc/ticket/14794#ticket
  - -Wno-missing-import-lists # Requires explicit imports of _every_ function (e.g. ‘$’); too strict
  - -Wno-missed-specialisations # When GHC can’t specialize a polymorphic function. No big deal and requires fixing underlying libraries to solve.
  - -Wno-all-missed-specialisations # See missed-specialisations
  - -Wno-unsafe # Don’t use Safe Haskell warnings
  - -Wno-safe # Don’t use Safe Haskell warnings
  - -Wno-missing-local-signatures # Warning for polymorphic local bindings; nothing wrong with those.
  - -Wno-monomorphism-restriction # Don’t warn if the monomorphism restriction is used
  - -Wno-missing-safe-haskell-mode
  - -Wno-partial-fields
  - -Wno-prepositive-qualified-module
  - -Wno-missing-export-lists
  - -Wno-orphans
  # remove the next options when possible. This is a temporary workaround
  - -Wno-missing-deriving-strategies # for otlp generated files. Might move this to new package
  - -Wno-missing-role-annotations # for otlp generated files. Might move this to new package
  - -Wno-unused-matches
  - -Wno-missing-kind-signatures
  - -Wno-type-defaults
  - -Wno-unused-top-binds
  - -Wno-unused-imports
  - -Wno-error=incomplete-record-selectors
  - -Wno-ambiguous-fields
  # - -plugin-package hiedb-plugin -fplugin Plugin.HieDb
  # - "-prof"
  # - -g
  # - "-fprof-late"
  # - "-finfo-table-map"

default-extensions:
  # Already in GHC2024: BangPatterns, DataKinds, DeriveGeneric, DerivingStrategies,
  #   ExplicitNamespaces, GADTs, LambdaCase, MonoLocalBinds, RoleAnnotations,
  #   TupleSections, ViewPatterns (+ all GHC2021 extensions)
  - AllowAmbiguousTypes
  - BlockArguments
  - DeriveAnyClass
  - DerivingVia
  - DuplicateRecordFields
  - ExtendedDefaultRules
  - MultilineStrings
  - MultiWayIf
  - NoImplicitPrelude
  - OverloadedLabels
  - OverloadedLists
  - OverloadedRecordDot
  - OverloadedStrings
  - PackageImports
  - PatternSynonyms
  - QuasiQuotes
  - RecordWildCards
  - TemplateHaskell
  - TypeFamilies
  - UndecidableInstances
  - ViewPatterns

description: Please see the README on GitHub at <https://github.com/githubuser/monoscope#readme>

library:
  ghc-options:
    - -fplugin AutoInstrument
  source-dirs:
    - src
  generated-exposed-modules:
    # Common
    - Proto.Opentelemetry.Proto.Common.V1.Common
    - Proto.Opentelemetry.Proto.Common.V1.Common_Fields
    # Resource
    - Proto.Opentelemetry.Proto.Resource.V1.Resource
    - Proto.Opentelemetry.Proto.Resource.V1.Resource_Fields
    # Trace
    - Proto.Opentelemetry.Proto.Trace.V1.Trace
    - Proto.Opentelemetry.Proto.Trace.V1.Trace_Fields
    - Proto.Opentelemetry.Proto.Collector.Trace.V1.TraceService
    - Proto.Opentelemetry.Proto.Collector.Trace.V1.TraceService_Fields
    # Logs
    - Proto.Opentelemetry.Proto.Logs.V1.Logs
    - Proto.Opentelemetry.Proto.Logs.V1.Logs_Fields
    - Proto.Opentelemetry.Proto.Collector.Logs.V1.LogsService
    - Proto.Opentelemetry.Proto.Collector.Logs.V1.LogsService_Fields
    # Metrics
    - Proto.Opentelemetry.Proto.Metrics.V1.Metrics
    - Proto.Opentelemetry.Proto.Metrics.V1.Metrics_Fields
    - Proto.Opentelemetry.Proto.Collector.Metrics.V1.MetricsService
    - Proto.Opentelemetry.Proto.Collector.Metrics.V1.MetricsService_Fields
    # Profiles
    - Proto.Opentelemetry.Proto.Profiles.V1development.Profiles
    - Proto.Opentelemetry.Proto.Profiles.V1development.Profiles_Fields
    - Proto.Opentelemetry.Proto.Collector.Profiles.V1development.ProfilesService
    - Proto.Opentelemetry.Proto.Collector.Profiles.V1development.ProfilesService_Fields

  dependencies: !include hpack-includes/lib-deps.yaml

executables:
  monoscope-server:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -fplugin AutoInstrument
      - -rtsopts
      - '"-with-rtsopts=-N8 -M14G -A32m -I5 -Fd2"'
      # - -O2
      # - -fPIC
    dependencies:
      - monoscope
      - hs-opentelemetry-instrumentation-auto
      - name: relude
        version: '>= 1.2.0.0'
        mixin:
          - (Relude as Prelude)
          - ''

  monoscope:
    main: Main.hs
    source-dirs: cli/
    ghc-options:
      - -threaded
    generated-other-modules:
      - Paths_monoscope
    dependencies:
      - base
      - monoscope
      - optparse-applicative
      - ansi-terminal
      - directory
      - http-client
      - http-client-tls
      - wreq
      - yaml
      - aeson
      - aeson-pretty
      - filepath
      - unix
      - lens
      - lens-aeson
      - text
      - containers
      - unliftio
      - effectful
      - effectful-core
      - process
      - mtl
      - brick
      - vty
      - vector
      - deriving-aeson
      - name: relude
        version: '>= 1.2.0.0'
      - time
      - hs-opentelemetry-sdk
      - hs-opentelemetry-api
      - hs-opentelemetry-instrumentation-auto
      - unordered-containers

tests:
  doctests:
    main: Main.hs
    source-dirs: test/doctests
    ghc-options:
      - -fno-write-ide-info
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N -A64m"'
      - -O0
    dependencies:
      - base
      - monoscope
      - hs-opentelemetry-instrumentation-auto
      - doctest >= 0.20
      - relude >= 1.2.0.0
  integration-tests:
    main: Main.hs
    source-dirs: test/integration
    ghc-options:
      - -fno-write-ide-info
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N -A64m"'
      - -O0
    build-tools:
      - hspec-discover:hspec-discover
    dependencies:
      - base
      - monoscope
      - hs-opentelemetry-instrumentation-auto
      - hspec
      - relude >= 1.2.0.0
      - aeson
      - hasql-interpolate
      - hasql-pool
      - pg-entity
      - postgresql-simple
      - effectful
      - servant
      - servant-server
      - servant-htmx
      - resource-pool
      - generic-lens
      - odd-jobs
      - aeson-qq
      - base64
      - time
      - uuid
      - uuid-quasi
      - vector
      - cache
      - data-default
      - clock
      - lens
      - lens-aeson
      - proto-lens
      - grapesy
      - wreq
      - http-client
      - unliftio
      - bytestring
      - containers
      - text
      - cryptonite
      - aeson-pretty
      - memory
      - base16-bytestring
      - directory
      - pg-transact
      - openapi3
      - monad-time-effectful
      - ki
      - ki-effectful
      - effectful-core
      - effectful-postgresql
      - process
      - lucid
      - http-types
      - wai
      - wai-extra
      - unordered-containers
  unit-tests:
    main: Main.hs
    source-dirs: test/unit
    ghc-options:
      - -fno-write-ide-info
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N -A64m"'
      - -O0
    dependencies:
      - monoscope
      - hs-opentelemetry-instrumentation-auto
      - hspec
      - relude >= 1.2.0.0
      - aeson
      - containers
      - text
      - uuid
      - uuid-quasi
      - neat-interpolation
      - aeson-qq
      - extra
      - effectful-core
      - log-effectful
      - log-base
      - vector
      - time
  # test-dev: lib + integration tests as ONE GHCi target (Jade's cabal test-dev trick).
  # Use via `make live-test-dev`. Library deps come from hpack-includes/lib-deps.yaml
  # (shared with `library`); integration-only extras listed inline. Not run by `make test` / CI.
  test-dev:
    main: Main.hs
    source-dirs:
      - src
      - test/integration
    ghc-options:
      - -fno-write-ide-info
      - -threaded
      - -rtsopts
      - '"-with-rtsopts=-N -A64m"'
      - -O0
    build-tools:
      - hspec-discover:hspec-discover
    generated-other-modules:
      - Proto.Opentelemetry.Proto.Common.V1.Common
      - Proto.Opentelemetry.Proto.Common.V1.Common_Fields
      - Proto.Opentelemetry.Proto.Resource.V1.Resource
      - Proto.Opentelemetry.Proto.Resource.V1.Resource_Fields
      - Proto.Opentelemetry.Proto.Trace.V1.Trace
      - Proto.Opentelemetry.Proto.Trace.V1.Trace_Fields
      - Proto.Opentelemetry.Proto.Collector.Trace.V1.TraceService
      - Proto.Opentelemetry.Proto.Collector.Trace.V1.TraceService_Fields
      - Proto.Opentelemetry.Proto.Logs.V1.Logs
      - Proto.Opentelemetry.Proto.Logs.V1.Logs_Fields
      - Proto.Opentelemetry.Proto.Collector.Logs.V1.LogsService
      - Proto.Opentelemetry.Proto.Collector.Logs.V1.LogsService_Fields
      - Proto.Opentelemetry.Proto.Metrics.V1.Metrics
      - Proto.Opentelemetry.Proto.Metrics.V1.Metrics_Fields
      - Proto.Opentelemetry.Proto.Collector.Metrics.V1.MetricsService
      - Proto.Opentelemetry.Proto.Collector.Metrics.V1.MetricsService_Fields
      - Proto.Opentelemetry.Proto.Profiles.V1development.Profiles
      - Proto.Opentelemetry.Proto.Profiles.V1development.Profiles_Fields
      - Proto.Opentelemetry.Proto.Collector.Profiles.V1development.ProfilesService
      - Proto.Opentelemetry.Proto.Collector.Profiles.V1development.ProfilesService_Fields
    dependencies: !include hpack-includes/lib-deps.yaml

benchmarks:
  utils-bench:
    main: Main.hs
    source-dirs: test/bench
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - monoscope
      - hs-opentelemetry-instrumentation-auto
      - hspec
      - relude >= 1.2.0.0
      - time
